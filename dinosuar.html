<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Dino</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Exo 2', sans-serif;
  }

  #gameWrapper {
    position: relative;
    width: 480px;
    height: 640px;
  }

  canvas {
    display: block;
    border: 1px solid rgba(0,255,200,0.2);
    box-shadow: 0 0 40px rgba(0,255,200,0.15), 0 0 80px rgba(100,0,255,0.1);
    border-radius: 4px;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 16px 20px;
    pointer-events: none;
  }

  .score-box {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: rgba(0,255,200,0.9);
    text-shadow: 0 0 12px rgba(0,255,200,0.6);
    letter-spacing: 1px;
  }

  .score-box span {
    display: block;
    font-size: 22px;
    font-weight: 700;
  }

  #speedBadge {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: rgba(180,100,255,0.9);
    text-shadow: 0 0 10px rgba(180,100,255,0.6);
    text-align: right;
    letter-spacing: 1px;
  }

  #speedBadge span {
    display: block;
    font-size: 18px;
    font-weight: 700;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c" width="480" height="640"></canvas>
  <div id="ui">
    <div class="score-box">SCORE<span id="scoreDisp">0</span></div>
    <div class="score-box" style="text-align:center;">BEST<span id="bestDisp">0</span></div>
    <div id="speedBadge">SPEED<span id="speedDisp">×1.0</span></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// AudioContext for sounds
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playFlapSound() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(550, ac.currentTime + 0.06);
    gain.gain.setValueAtTime(0.18, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
    osc.start(); osc.stop(ac.currentTime + 0.12);
  } catch(e) {}
}

function playDeathSound() {
  try {
    const ac = getAudio();
    // Explosion-like sound
    const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.5);
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    src.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.6, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);

    // Bass thud
    const osc = ac.createOscillator();
    const g2 = ac.createGain();
    osc.connect(g2); g2.connect(ac.destination);
    osc.frequency.setValueAtTime(200, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30, ac.currentTime + 0.4);
    g2.gain.setValueAtTime(0.5, ac.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
    src.start(); osc.start(); osc.stop(ac.currentTime + 0.5); src.stop(ac.currentTime + 0.5);
  } catch(e) {}
}

function playScoreSound() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(440, ac.currentTime);
    osc.frequency.setValueAtTime(660, ac.currentTime + 0.06);
    gain.gain.setValueAtTime(0.08, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    osc.start(); osc.stop(ac.currentTime + 0.15);
  } catch(e) {}
}

// Stars
const STAR_COUNT = 200;
const stars = [];
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.2,
    speed: Math.random() * 0.6 + 0.1,
    alpha: Math.random() * 0.7 + 0.3,
    twinkle: Math.random() * Math.PI * 2
  });
}

// Nebula clouds (static decorative blobs)
const nebulas = [
  { x: 80, y: 100, rx: 120, ry: 80, color: 'rgba(100,0,200,0.07)' },
  { x: 380, y: 300, rx: 100, ry: 70, color: 'rgba(0,180,255,0.06)' },
  { x: 200, y: 500, rx: 130, ry: 90, color: 'rgba(200,0,100,0.05)' },
];

// Game state
let dino, pipes, score, best, gameSpeed, state, frame, particles, flashTimer;
// state: 'start' | 'play' | 'dead'

const PIPE_W = 54;
const PIPE_GAP = 170;
const GRAVITY = 0.38;
const JUMP = -7.2;
const BASE_SPEED = 2.8;

function init() {
  dino = { x: 90, y: H / 2, vy: 0, w: 36, h: 42, angle: 0, legPhase: 0, dead: false };
  pipes = [];
  score = 0;
  gameSpeed = BASE_SPEED;
  frame = 0;
  particles = [];
  flashTimer = 0;
  updateUI();
}

function updateUI() {
  document.getElementById('scoreDisp').textContent = score;
  document.getElementById('bestDisp').textContent = best || 0;
  document.getElementById('speedDisp').textContent = '×' + gameSpeed.toFixed(1);
}

function spawnPipe() {
  const minY = 90, maxY = H - 90 - PIPE_GAP;
  const topH = Math.random() * (maxY - minY) + minY;
  pipes.push({ x: W + 10, topH, scored: false });
}

function spawnParticles(x, y, count, col) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      r: Math.random() * 4 + 1,
      col: col || `hsl(${Math.random()*60+160},100%,70%)`,
      life: Math.random() * 30 + 20
    });
  }
}

// Draw functions
function drawBackground() {
  // Space gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#000010');
  bg.addColorStop(0.5, '#050018');
  bg.addColorStop(1, '#000510');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Nebulas
  for (const n of nebulas) {
    ctx.save();
    ctx.translate(n.x, n.y);
    ctx.scale(n.rx / 50, n.ry / 50);
    ctx.beginPath();
    ctx.arc(0, 0, 50, 0, Math.PI * 2);
    ctx.fillStyle = n.color;
    ctx.fill();
    ctx.restore();
  }

  // Stars
  for (const s of stars) {
    s.twinkle += 0.04;
    const alpha = s.alpha * (0.7 + 0.3 * Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
    // Some stars have a glow
    if (s.r > 1.2) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(150,200,255,${alpha * 0.15})`;
      ctx.fill();
    }
  }

  // Shooting star occasionally
  if (frame % 300 === 0) spawnShootingStar();
  drawShootingStars();
}

let shootingStars = [];
function spawnShootingStar() {
  shootingStars.push({ x: Math.random() * W, y: Math.random() * H * 0.4, len: 80, life: 30, alpha: 1 });
}
function drawShootingStars() {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    const grad = ctx.createLinearGradient(s.x, s.y, s.x + s.len, s.y + s.len * 0.4);
    grad.addColorStop(0, `rgba(255,255,255,${s.alpha})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + s.len, s.y + s.len * 0.4);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    s.x += 4; s.y += 1.5; s.alpha -= 1 / s.life; s.life--;
    if (s.life <= 0) shootingStars.splice(i, 1);
  }
}

function drawPipe(pipe) {
  // Top pipe
  const topGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_W, 0);
  topGrad.addColorStop(0, '#0a3a2a');
  topGrad.addColorStop(0.35, '#1aff9a');
  topGrad.addColorStop(0.65, '#0affb0');
  topGrad.addColorStop(1, '#083020');
  ctx.fillStyle = topGrad;
  ctx.fillRect(pipe.x, 0, PIPE_W, pipe.topH);

  // Pipe cap top
  ctx.fillStyle = '#22ffbb';
  ctx.shadowColor = '#00ffaa';
  ctx.shadowBlur = 12;
  ctx.fillRect(pipe.x - 5, pipe.topH - 22, PIPE_W + 10, 22);
  ctx.shadowBlur = 0;

  const botY = pipe.topH + PIPE_GAP;
  const botH = H - botY;

  // Bottom pipe
  const botGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_W, 0);
  botGrad.addColorStop(0, '#0a3a2a');
  botGrad.addColorStop(0.35, '#1aff9a');
  botGrad.addColorStop(0.65, '#0affb0');
  botGrad.addColorStop(1, '#083020');
  ctx.fillStyle = botGrad;
  ctx.fillRect(pipe.x, botY, PIPE_W, botH);

  // Pipe cap bottom
  ctx.fillStyle = '#22ffbb';
  ctx.shadowColor = '#00ffaa';
  ctx.shadowBlur = 12;
  ctx.fillRect(pipe.x - 5, botY, PIPE_W + 10, 22);
  ctx.shadowBlur = 0;

  // Glow lines on pipes
  ctx.strokeStyle = 'rgba(0,255,160,0.3)';
  ctx.lineWidth = 2;
  for (let y = 20; y < pipe.topH; y += 30) {
    ctx.beginPath();
    ctx.moveTo(pipe.x + 6, y);
    ctx.lineTo(pipe.x + PIPE_W - 6, y);
    ctx.stroke();
  }
  for (let y = botY + 30; y < H; y += 30) {
    ctx.beginPath();
    ctx.moveTo(pipe.x + 6, y);
    ctx.lineTo(pipe.x + PIPE_W - 6, y);
    ctx.stroke();
  }
}

function drawDino(d) {
  ctx.save();
  ctx.translate(d.x + d.w / 2, d.y + d.h / 2);
  ctx.rotate(d.angle);

  if (!d.dead) {
    // Glow behind dino
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 18;
  }

  const bx = -d.w / 2, by = -d.h / 2;

  // Body
  ctx.fillStyle = d.dead ? '#ff4444' : '#44ff99';
  ctx.beginPath();
  ctx.roundRect(bx + 4, by + 8, 26, 28, 6);
  ctx.fill();

  // Head
  ctx.fillStyle = d.dead ? '#ff6666' : '#66ffaa';
  ctx.beginPath();
  ctx.roundRect(bx + 8, by, 22, 18, [6, 8, 4, 4]);
  ctx.fill();

  // Eye
  ctx.fillStyle = d.dead ? '#fff' : '#001a0d';
  ctx.beginPath();
  ctx.arc(bx + 25, by + 7, 3.5, 0, Math.PI * 2);
  ctx.fill();

  if (!d.dead) {
    // Pupil
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bx + 26, by + 6, 1, 0, Math.PI * 2);
    ctx.fill();
    // Nostril
    ctx.fillStyle = '#003d1a';
    ctx.beginPath();
    ctx.arc(bx + 29, by + 11, 1.2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // X eyes when dead
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(bx + 22, by + 5); ctx.lineTo(bx + 28, by + 10);
    ctx.moveTo(bx + 28, by + 5); ctx.lineTo(bx + 22, by + 10);
    ctx.stroke();
  }

  // Spine bumps
  ctx.fillStyle = d.dead ? '#ff3333' : '#22ff88';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(bx + 7 + i * 5, by + 8);
    ctx.lineTo(bx + 4 + i * 5, by + 3);
    ctx.lineTo(bx + 10 + i * 5, by + 8);
    ctx.fill();
  }

  // Tail
  ctx.fillStyle = d.dead ? '#ff4444' : '#44ff99';
  ctx.beginPath();
  ctx.moveTo(bx + 4, by + 26);
  ctx.quadraticCurveTo(bx - 12, by + 30, bx - 8, by + 20);
  ctx.quadraticCurveTo(bx - 2, by + 16, bx + 4, by + 22);
  ctx.fill();

  // Arms (clapping effect - moves with leg phase)
  const armSwing = Math.sin(d.legPhase) * 8;
  ctx.fillStyle = d.dead ? '#ff4444' : '#44ff99';
  ctx.beginPath();
  ctx.roundRect(bx + 20, by + 16 + armSwing * 0.3, 10, 8, 3);
  ctx.fill();

  // Legs
  const legSwing = Math.sin(d.legPhase) * 6;
  ctx.fillStyle = d.dead ? '#cc3333' : '#33cc77';
  // Leg 1
  ctx.beginPath();
  ctx.roundRect(bx + 8, by + 34 + legSwing, 8, 12, 3);
  ctx.fill();
  // Leg 2
  ctx.beginPath();
  ctx.roundRect(bx + 18, by + 34 - legSwing, 8, 12, 3);
  ctx.fill();

  // Foot
  ctx.fillStyle = d.dead ? '#993322' : '#229966';
  ctx.beginPath();
  ctx.roundRect(bx + 5, by + 44 + legSwing, 12, 5, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(bx + 15, by + 44 - legSwing, 12, 5, 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.alpha -= 1 / p.life; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  ctx.globalAlpha = 1;
}

function drawFlash() {
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,50,50,${flashTimer / 15 * 0.35})`;
    ctx.fillRect(0, 0, W, H);
    flashTimer--;
  }
}

function drawHUD() {
  // Next speed milestone
  const nextMilestone = Math.ceil(score / 100) * 100;
  const progress = (score % 100) / 100;
  if (score < nextMilestone) {
    ctx.save();
    ctx.font = '10px Orbitron';
    ctx.fillStyle = 'rgba(180,100,255,0.5)';
    ctx.fillText(`NEXT BOOST: ${nextMilestone}`, W / 2 - 50, H - 16);
    // Progress bar
    ctx.strokeStyle = 'rgba(180,100,255,0.2)';
    ctx.lineWidth = 2;
    ctx.strokeRect(W / 2 - 50, H - 10, 100, 4);
    ctx.fillStyle = 'rgba(180,100,255,0.6)';
    ctx.fillRect(W / 2 - 50, H - 10, 100 * progress, 4);
    ctx.restore();
  }
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.save();
  ctx.font = 'bold 42px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 25;
  ctx.fillText('SPACE DINO', W / 2, H / 2 - 80);
  ctx.shadowBlur = 0;

  ctx.font = '14px Exo 2';
  ctx.fillStyle = 'rgba(150,255,210,0.8)';
  ctx.fillText('TAP / CLICK / SPACE to launch!', W / 2, H / 2 - 30);

  // Animated dino preview
  drawDino({ x: W / 2 - 18, y: H / 2 + 10, w: 36, h: 42, angle: 0, legPhase: frame * 0.1, dead: false });

  ctx.font = '11px Orbitron';
  ctx.fillStyle = 'rgba(180,100,255,0.7)';
  ctx.fillText('Every 100 points = +0.5 speed', W / 2, H / 2 + 90);
  ctx.restore();
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(0,0,10,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.textAlign = 'center';

  ctx.font = 'bold 38px Orbitron';
  ctx.fillStyle = '#ff4455';
  ctx.shadowColor = '#ff0022';
  ctx.shadowBlur = 20;
  ctx.fillText('GAME OVER', W / 2, H / 2 - 70);
  ctx.shadowBlur = 0;

  ctx.font = '20px Orbitron';
  ctx.fillStyle = '#00ffcc';
  ctx.fillText(`Score: ${score}`, W / 2, H / 2 - 20);

  ctx.font = '14px Exo 2';
  ctx.fillStyle = 'rgba(200,200,255,0.7)';
  ctx.fillText(`Best: ${best}`, W / 2, H / 2 + 20);

  // Restart button
  const bx = W / 2 - 80, by = H / 2 + 50, bw = 160, bh = 44;
  const rGrad = ctx.createLinearGradient(bx, by, bx, by + bh);
  rGrad.addColorStop(0, 'rgba(0,255,160,0.25)');
  rGrad.addColorStop(1, 'rgba(0,120,80,0.15)');
  ctx.fillStyle = rGrad;
  ctx.strokeStyle = 'rgba(0,255,160,0.7)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 8);
  ctx.fill(); ctx.stroke();

  ctx.font = 'bold 14px Orbitron';
  ctx.fillStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 8;
  ctx.fillText('▶ RESTART', W / 2, by + 28);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function checkCollision() {
  const margin = 6;
  const dx = dino.x + margin, dy = dino.y + margin;
  const dw = dino.w - margin * 2, dh = dino.h - margin * 2;

  // Floor/ceiling
  if (dino.y + dino.h >= H || dino.y <= 0) return true;

  for (const p of pipes) {
    if (dx + dw > p.x + 4 && dx < p.x + PIPE_W - 4) {
      if (dy < p.topH || dy + dh > p.topH + PIPE_GAP) return true;
    }
  }
  return false;
}

function jump() {
  if (state === 'start') {
    state = 'play';
    dino.vy = JUMP;
    playFlapSound();
    return;
  }
  if (state === 'dead') {
    init();
    state = 'play';
    dino.vy = JUMP;
    playFlapSound();
    return;
  }
  if (state === 'play') {
    dino.vy = JUMP;
    playFlapSound();
    spawnParticles(dino.x + 5, dino.y + dino.h, 6, 'rgba(100,255,180,0.9)');
  }
}

function update() {
  frame++;

  // Scroll stars
  for (const s of stars) {
    s.x -= s.speed * (gameSpeed / BASE_SPEED);
    if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
  }

  if (state !== 'play') return;

  // Dino physics
  dino.vy += GRAVITY;
  dino.y += dino.vy;
  dino.angle = Math.max(-0.45, Math.min(0.9, dino.vy * 0.05));
  dino.legPhase += 0.18;

  // Spawn pipes
  if (frame % Math.round(115 / (gameSpeed / BASE_SPEED)) === 0) spawnPipe();

  // Move pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= gameSpeed;
    // Scoring
    if (!pipes[i].scored && pipes[i].x + PIPE_W < dino.x) {
      pipes[i].scored = true;
      score++;
      playScoreSound();
      spawnParticles(dino.x + dino.w, dino.y + dino.h / 2, 12, `hsl(${Math.random()*60+160},100%,70%)`);

      // Speed up every 100 points
      if (score % 100 === 0) {
        gameSpeed += 0.5;
        // Speed burst particles
        for (let j = 0; j < 25; j++) spawnParticles(dino.x, dino.y + dino.h / 2, 1, 'rgba(200,100,255,0.9)');
      }

      if (score > (best || 0)) best = score;
      updateUI();
    }
    if (pipes[i].x + PIPE_W < -10) pipes.splice(i, 1);
  }

  // Collision
  if (checkCollision()) {
    dino.dead = true;
    state = 'dead';
    playDeathSound();
    flashTimer = 15;
    spawnParticles(dino.x + dino.w / 2, dino.y + dino.h / 2, 40, null);
    if (score > (best || 0)) best = score;
    updateUI();
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (state === 'play' || state === 'dead') {
    for (const p of pipes) drawPipe(p);
    drawDino(dino);
    drawParticles();
    drawFlash();
    drawHUD();
  }

  if (state === 'start') drawStartScreen();
  if (state === 'dead') drawDeadScreen();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });

// Init
best = 0;
init();
state = 'start';
loop();
</script>
</body>
</html>
